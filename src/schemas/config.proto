syntax = "proto3";

package config;

option go_package = "github.com/Bastien-Antigravity/distributed-config/src/schemas";

message ConfigMsg {
    enum Cmd {
        GET_SYNC = 0;
        PUT_SYNC = 1;
        BROADCAST_SYNC = 2;
        ACK = 3;
        ERROR = 4;
        BROADCAST_REGISTRY = 5;
    }
    
    Cmd Command = 1;

    // JSON encoded payload representing either the ConfigMap or the ServiceRegistry.
    // This removes the need for infinite Protobuf model coupling.
    bytes Payload = 2; 
}
